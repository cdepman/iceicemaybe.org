[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: serve index.html for client-side routes.
# Existing static files (e.g. /off-grid-ice-rig/IMG_7184.jpeg) are served
# directly and are not affected by this rule.
[[redirects]]
  from = "/off-grid-ice-rig"
  to = "/off-grid-ice-rig/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
